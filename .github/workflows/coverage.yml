name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake lcov

      - name: Configure
        run: cmake --preset coverage

      - name: Build
        run: cmake --build --preset coverage

      - name: Test
        run: ctest --preset coverage --output-on-failure

      - name: Generate lcov report
        run: |
          # --exclude at capture: FetchContent'd Catch2 coverage data references
          # source paths that don't exist in the workspace (both under _deps and
          # as phantom build-relative "src/catch2/..." header paths recorded in
          # our test objects), and geninfo hard-errors on them before any
          # --remove filter could apply.
          lcov --capture --directory . --output-file coverage.info \
               --exclude '*/_deps/*' --exclude '*/catch2/*' \
               --ignore-errors empty
          lcov --remove coverage.info '/usr/*' '*/tests/*' '*/vendor/*' '*/extern/*' \
               '*/_deps/*' '*/catch2/*' \
               --output-file coverage.info --ignore-errors empty,unused

      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
